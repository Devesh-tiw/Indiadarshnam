<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Darshnam</title>
    <link rel="stylesheet" href="dear.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
       #middlearea {
    display: flex;
    height: calc(100vh - 60px); /* Adjusts height based on header size */
    overflow: hidden;
}

#sidebar {
    width: 250px;
    background-color: #f8f9fa;
    padding: 20px;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    gap: 15px; /* Adds space between inputs and labels */
}

#indiaarea {
    flex-grow: 1; /* Makes the map fill the rest of the screen */
    position: relative;
}
#header {
    display: flex;
    align-items: center; /* Vertically centers the logo and text */
    background-color: #97db72; /* Or keep it dark, but change text color */
    padding: 10px 20px;
    border-bottom: 1px solid #ddd;
    color: #abca4f; /* Dark text for a light background */
}

#header img {
    height: 40px;
    width: auto; /* Keeps aspect ratio */
    margin-right: 15px;
}
#map{
    height: 100%;
    width: 100%;
}
    </style>
</head>
<body>
    <div id="header" style="display:flex; align-items: center; padding: 10px;">
        <img src="/Indiadarshnam/images/image.png" style="height:40px; width:80px;">
        <h1 style="margin-left: 20px;">Bharat Darshnam</h1>
    </div>

    <div id="middlearea"> 
        <div id="sidebar">
            <h3>Side BAR</h3>
            <label for="erarange">Select Era:</label>
            <input type="range" id="erarange" min="500" max="2026" value="2026" oninput="updateEra(this.value)">
            <p id="eraprint"></p>
        </div>

        <div id="indiaarea">
            <div id="map"></div> </div>
    </div>

    <div id="footer">Footer</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // This code must be AFTER the leaflet.js script and AFTER the map div
        var map = L.map('map').setView([20.5937, 78.9629], 5); 

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
    </script>

    <script src="dear.js"></script>
</body>
</html>
