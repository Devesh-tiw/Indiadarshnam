<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Darshnam</title>
    <link rel="stylesheet" href="dear.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <div id="header" style="display:flex">
        <img src="/Indiadarshnam/images/image.png" height="40" width="80">
    </div>

    <div id="middlearea">
        <div id="sidebar">
            <div id="eraselect">
                <label for="erarange" style="color:black;">Select Era:</label>

                <input type="range" id="erarange" min="-2000" max="2026" value="2026" oninput="updateEra(this.value)">
                <p id="eraprint"></p>
            </div>

            <div class="number-of-sites">
                <div class="sites-count" id="siteCount">0</div>
                <div class="sites-text">heritage sites<br>visible on map</div>
            </div>
                        <div class="era-jumps">
                            <p style="color:black">Jump to Era</p>
                            <div class="era-jump-grid">
                                <button class="jump-btn" data-year="-2000">Vedic Age<br>2000 BCE</button>
                                <br>
                                <button class="jump-btn" data-year="-200">Classical<br>200 BCE</button>
                                <br>
                                <button class="jump-btn" data-year="600">Early Historic<br>600 CE</button>
                                <br>
                                <button class="jump-btn" data-year="1000">Early Medieval<br>1000 CE</button>
                                <br>
                                <button class="jump-btn" data-year="1500">Late Medieval<br>1500 CE</button>
                                <br>
                                <button class="jump-btn" data-year="2026">Present Day<br>2026 CE</button>
                            </div>
                        </div>
                        <div class="site-list-section">
                            <span class="site-list-label" style="color:black">Heritage Sites</span>
                            <div id="siteList"></div>
                        </div>

        </div>

        <div id="indiaarea" style="color:black;">
            <div id="map"></div>
        </div>
    </div>

    <div id="footer">Footer</div>
</body>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // This code must be AFTER the leaflet.js script and AFTER the map div
    var map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
</script>
<script src="dear.js"></script>
</body>


</html>
