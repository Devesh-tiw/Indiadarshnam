<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Darshnam | Heritage Explorer</title>
    <link rel="stylesheet" href="dear1.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <header id="header">
        <div class="logo-section">
            <img src="/Indiadarshnam/images/image.png" alt="Logo" height="40">
            <span class="brand-name">Bharat Darshnam</span>
        </div>
        <div class="nav-controls">
            <button id="vlogBtn">📖 Community Vlogs</button>
            <button id="writeVlogBtn" class="primary-btn">✍️ Write a Vlog</button>
        </div>
    </header>

    <main id="middlearea">
        <aside id="sidebar">
            <div class="sidebar-block">
                <div class="era-label">
                    <span id="era-number"></span>
                    <span id="era-bce-ce"></span>
                </div>
                <input type="range" id="erarange" min="-2000" max="2026" value="-2000" oninput="updateEra(this.value)">
            </div>

            <div class="site-counter">
                <span id="siteCount">0</span>
                <p>heritage sites<br>discovered in this era</p>
            </div>

            <div class="era-navigation">
                <p class="small-title">Jump to Era</p>
                <div class="jump-grid">
                    <button class="jump-btn" data-year="-2000">Vedic<br><small>2000 BCE</small></button>
                    <button class="jump-btn" data-year="-200">Classical<br><small>200 BCE</small></button>
                    <button class="jump-btn" data-year="600">Early Hist.<br><small>600 CE</small></button>
                    <button class="jump-btn" data-year="1000">Medieval<br><small>1000 CE</small></button>
                    <button class="jump-btn" data-year="1500">Late Med.<br><small>1500 CE</small></button>
                    <button class="jump-btn" data-year="2026">Modern<br><small>2026 CE</small></button>
                </div>
            </div>

            <div class="site-list-wrapper">
                <p class="small-title">Active Sites</p>
                <div id="siteList"></div>
            </div>
        </aside>

        <section id="indiaarea">
            <div id="map">
                <div class="map-placeholder">
                    <div class="status-card">
                        <div class="spinner"></div>
                        <h3>Initializing Map Tiles</h3>
                        <p>We are currently synchronizing with the historical database. Please ensure your connection is stable.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer">
        &copy; 2026 Bharat Darshnam • Digital Heritage Preservation
    </footer>

    <div id="vlogModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title"></span>
                <button id="modalClose">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="writeVlogModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">✍️ Contribute to History</span>
                <button id="writeVlogClose">✕</button>
            </div>
            <div id="writeVlogBody">
                <div class="input-group">
                    <label>Explorer Name</label>
                    <input type="text" id="wv-author" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>Historical Site</label>
                    <input type="text" id="wv-site" placeholder="e.g. Hampi">
                </div>
                <div class="input-group">
                    <label>Experience</label>
                    <textarea id="wv-text" maxlength="500" placeholder="What did you find there?"></textarea>
                    <small id="wv-count">0/500</small>
                </div>
                <button id="wv-submit" class="save-btn">Save Experience</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="dear.js"></script>
</body>
</html>
